<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.page_title %}{{ page.page_title }} | {% endif %}{{ site.title }}</title>
  <link rel="icon" href="{{ '/thumbnail.png' | relative_url }}" type="image/png">
  {% seo %}
  <style>
    :root {
      --ink: #111111;
      --ink-soft: #333333;
      --ink-muted: #71717a;
      --surface: #ffffff;
      --surface-alt: #fafafa;
      --border: #e4e4e7;
      --border-light: #f1f1f3;
      --font: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      font-size: 15.5px;
      line-height: 1.7;
      color: var(--ink-soft);
      background: var(--surface);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-light);
    }

    .nav-inner {
      max-width: 840px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 52px;
    }

    .nav-name {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: -0.01em;
    }

    .nav-links { display: flex; gap: 0; list-style: none; }

    .nav-links a {
      display: block;
      padding: 5px 13px;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--ink-muted);
      text-decoration: none;
      border-radius: 5px;
      transition: color 0.15s, background 0.15s;
    }

    .nav-links a:hover { color: var(--ink); background: var(--surface-alt); }
    .nav-links a.active { color: var(--ink); font-weight: 600; }

    /* ── MAIN ── */
    main { max-width: 840px; margin: 0 auto; padding: 0 28px; }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 64px 0 44px;
      border-bottom: 1px solid var(--border-light);
    }

    .page-header.no-border { border-bottom: none; }

    .page-header h1 {
      font-size: 1.9rem;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.03em;
      margin-bottom: 20px;
    }

    .page-header p {
      font-size: 0.95rem;
      line-height: 1.76;
      color: var(--ink-soft);
      max-width: 660px;
    }

    .page-header p + p { margin-top: 14px; }

    .page-header img {
      max-width: 660px;
      width: 100%;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    /* ── HERO (About page) ── */
    .hero {
      display: grid;
      grid-template-columns: 190px 1fr;
      gap: 44px;
      align-items: start;
      padding: 68px 0 52px;
    }

    .hero-photo img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 10px;
    }

    .hero-content h1 {
      font-size: 1.9rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.2;
      letter-spacing: -0.03em;
      margin-bottom: 10px;
    }

    .hero-meta {
      font-size: 0.86rem;
      font-weight: 400;
      color: var(--ink-muted);
      line-height: 1.65;
    }

    .hero-meta a {
      color: var(--ink-muted);
      text-decoration: underline;
      text-decoration-color: var(--border);
      text-underline-offset: 3px;
      transition: color 0.15s;
    }

    .hero-meta a:hover { color: var(--ink); }

    .hero-meta .role-block + .role-block {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border-light);
    }

    .hero-meta .role-title {
      font-weight: 600;
      color: var(--ink-soft);
    }

    /* ── SECTIONS ── */
    .section {
      padding: 40px 0;
      border-bottom: 1px solid var(--border-light);
    }

    .section:last-of-type { border-bottom: none; }

    .section-label {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--ink-muted);
      margin-bottom: 14px;
    }

    .section p {
      font-size: 0.93rem;
      line-height: 1.76;
      color: var(--ink-soft);
      max-width: 660px;
    }

    .section p + p { margin-top: 14px; }

    /* ── BIO ── */
    .bio {
      padding-bottom: 44px;
      border-bottom: 1px solid var(--border-light);
    }

    .bio p {
      font-size: 0.95rem;
      line-height: 1.76;
      color: var(--ink-soft);
      max-width: 620px;
    }

    .bio p + p { margin-top: 14px; }

    .bio a, .section a, .page-header a {
      color: var(--ink);
      text-decoration: underline;
      text-decoration-color: var(--border);
      text-underline-offset: 3px;
      transition: text-decoration-color 0.15s;
    }

    .bio a:hover, .section a:hover, .page-header a:hover {
      text-decoration-color: var(--ink);
    }

    /* ── RESEARCH AREAS ── */
    .research-area {
      padding: 44px 0;
      border-bottom: 1px solid var(--border-light);
    }

    .research-area:last-of-type { border-bottom: none; }

    .area-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.01em;
      margin-bottom: 16px;
    }

    .area-body p {
      font-size: 0.93rem;
      line-height: 1.76;
      color: var(--ink-soft);
      max-width: 660px;
    }

    .area-body p + p { margin-top: 14px; }

    .area-body a {
      color: var(--ink);
      text-decoration: underline;
      text-decoration-color: var(--border);
      text-underline-offset: 3px;
      transition: text-decoration-color 0.15s;
    }

    .area-body a:hover { text-decoration-color: var(--ink); }

    /* ── EDUCATION ── */
    .edu-rows { display: flex; flex-direction: column; gap: 10px; }
    .edu-row { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
    .edu-degree { font-weight: 600; color: var(--ink); font-size: 0.88rem; }
    .edu-detail { font-size: 0.85rem; color: var(--ink-muted); }
    .edu-honors { font-size: 0.8rem; color: var(--ink-muted); font-style: italic; }

    /* ── TEACHERS ── */
    .teacher-list { max-width: 660px; display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
    .teacher-row { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
    .teacher-name { font-weight: 600; color: var(--ink); font-size: 0.9rem; }
    .teacher-detail { font-size: 0.85rem; color: var(--ink-muted); }

    /* ── ENSEMBLES ── */
    .ensemble-list { max-width: 660px; display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
    .ensemble-item { font-size: 0.9rem; color: var(--ink-soft); line-height: 1.6; }
    .ensemble-role { font-size: 0.82rem; color: var(--ink-muted); }

    /* ── DETAIL LIST (Sports) ── */
    .detail-list { max-width: 660px; display: flex; flex-direction: column; gap: 6px; }
    .detail-item { font-size: 0.9rem; color: var(--ink-soft); line-height: 1.6; }
    .detail-note { font-size: 0.82rem; color: var(--ink-muted); }

    /* ── CONTACT ── */
    .contact-list { display: flex; flex-direction: column; gap: 20px; max-width: 660px; }
    .contact-item { display: flex; align-items: baseline; gap: 16px; }
    .contact-label { font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-muted); min-width: 64px; flex-shrink: 0; }
    .contact-value { font-size: 0.93rem; color: var(--ink-soft); }
    .contact-value a { color: var(--ink); text-decoration: underline; text-decoration-color: var(--border); text-underline-offset: 3px; transition: text-decoration-color 0.15s; }
    .contact-value a:hover { text-decoration-color: var(--ink); }

    /* ── VIDEO ── */
    .video-block { margin-top: 20px; margin-bottom: 12px; }
    .video-block + .video-block { margin-top: 28px; }
    .video-wrapper { position: relative; width: 100%; max-width: 660px; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px; background: var(--surface-alt); }
    .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; border-radius: 8px; }
    .video-caption { font-size: 0.82rem; color: var(--ink-muted); margin-top: 8px; max-width: 660px; }

    /* ── RECITAL PROGRAM ── */
    .program { max-width: 660px; margin-top: 20px; }
    .program-item { padding: 10px 0; border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: baseline; gap: 16px; }
    .program-item:last-child { border-bottom: none; }
    .program-work { font-size: 0.9rem; color: var(--ink); font-weight: 500; }
    .program-composer { font-size: 0.85rem; color: var(--ink-muted); text-align: right; flex-shrink: 0; }

    /* ── LINK PILLS ── */
    .link-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .link-pill {
      display: inline-flex; align-items: center; gap: 6px; padding: 7px 16px;
      font-size: 0.8rem; font-weight: 500; color: var(--ink-soft); background: var(--surface);
      border: 1px solid var(--border); border-radius: 100px; text-decoration: none; transition: all 0.15s;
    }
    .link-pill:hover { color: var(--ink); border-color: var(--ink-soft); transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .link-pill svg { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.45; }
    .link-pill:hover svg { opacity: 0.85; }

    /* ── FOOTER ── */
    footer {
      max-width: 840px;
      margin: 0 auto;
      padding: 20px 28px 36px;
      font-size: 0.75rem;
      color: var(--ink-muted);
      border-top: 1px solid var(--border-light);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 680px) {
      .hero { grid-template-columns: 1fr; gap: 24px; padding: 44px 0 36px; }
      .hero-photo { max-width: 150px; }
      .hero-content h1 { font-size: 1.5rem; }
      .nav-inner { padding: 0 16px; }
      main { padding: 0 16px; }
      .nav-links a { padding: 5px 7px; font-size: 0.72rem; }
      .page-header h1 { font-size: 1.5rem; }
      .page-header { padding: 44px 0 36px; }
      .edu-row { flex-direction: column; gap: 1px; }
      .teacher-row { flex-direction: column; gap: 1px; }
      .contact-item { flex-direction: column; gap: 4px; }
      .program-item { flex-direction: column; gap: 2px; }
      .program-composer { text-align: left; }
    }

    /* ── ENTRANCE ── */
    @keyframes enter {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="{{ '/' | relative_url }}" class="nav-name">David G. Kamper</a>
    <ul class="nav-links">
      <li><a href="{{ '/' | relative_url }}" {% if page.nav == 'about' %}class="active"{% endif %}>About</a></li>
      <li><a href="{{ '/research' | relative_url }}" {% if page.nav == 'research' %}class="active"{% endif %}>Research</a></li>
      <li><a href="{{ '/cv' | relative_url }}" {% if page.nav == 'cv' %}class="active"{% endif %}>CV</a></li>
      <li><a href="{{ '/music' | relative_url }}" {% if page.nav == 'music' %}class="active"{% endif %}>Music</a></li>
      <li><a href="{{ '/sports' | relative_url }}" {% if page.nav == 'sports' %}class="active"{% endif %}>Sports</a></li>
      <li><a href="{{ '/contact' | relative_url }}" {% if page.nav == 'contact' %}class="active"{% endif %}>Contact</a></li>
    </ul>
  </div>
</nav>

<main>
  {{ content }}
</main>

<footer>
  David G. Kamper &middot; UCLA &middot; Pritzker Hall Rm. 7509, 502 Portola Plaza, Los Angeles
</footer>

</body>
</html>
